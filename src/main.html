<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tapmach</title>
    <style>
        /* Root Colors */
        :root {
            --bg: #24273a;
            --cell-bg: #363a4f;
            --text: #cad3f5;
            --size: 40px;
        }

        /* Body */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* Textarea Styles */
        #textarea {
            width: 100%;
            position: absolute;
            box-sizing: border-box;
            bottom: 0px;
            left: 0px;
            padding: 5px;
            margin: 0;
        }
        textarea {
            display: block;
            box-sizing: border-box;
            width: 100%;

            line-height: 1.6rem;
            letter-spacing: 0.5%;

            background: #121212;
            color: #e0e0e0;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 10px;

            outline: none;
            resize: none;

            font-size: 14pt;
            font-family: "JetBrains Mono", monospace;
            
        }
        textarea:focus {
            border-color: #444;
        }

        /* Run Button */
        .run-btn {
            background-color: var(--cell-bg);
            color: var(--text);

            border: 1px solid rgba(202, 211, 245, 0.1);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;

            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transform-origin: center;

            position: absolute;
            top: 5px;
            right: 5px;
        }
        .run-btn:hover {
            background-color: #494d64;
            border-color: var(--text);
        }
        .run-btn:active {
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <button class="run-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
        </svg>
    </button>

    <div id="viewport">
        <div id="tape"></div>
    </div>

    <div id="textarea">
        <textarea name="main" id="main-textarea" rows="10" spellcheck="false" autocorrect="off" autofocus></textarea>
    </div>

    <script aria-label="textarea-content-save">
        const textarea = document.querySelector('textarea#main-textarea');
        let lastSavedValue = localStorage.getItem('text-content') || '';

        textarea.value = lastSavedValue;

        function debounce(func, timeout = 500) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => { func.apply(this, args); }, timeout);
            }
        }

        const saveContent = debounce((value) => {
            if (value === lastSavedValue) return;
            localStorage.setItem('text-content', value);
            lastSavedValue = value;
        }, 1000);

        textarea.addEventListener('input', (e) => saveContent(e.target.value))
    </script>
</body>
</html>
