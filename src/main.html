<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tapmach</title>
    <style>
        :root {
            --bg: #24273a;
            --cell-bg: #363a4f;
            --text: #cad3f5;
            --size: 40px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        #textarea {
            width: 100%;
            position: absolute;
            box-sizing: border-box;
            bottom: 0px;
            left: 0px;
            padding: 5px;
            margin: 0;
        }
        textarea {
            display: block;
            box-sizing: border-box;
            width: 100%;

            line-height: 1.6rem;
            letter-spacing: 0.5%;

            background: #121212;
            color: #e0e0e0;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 10px;

            outline: none;
            resize: none;

            font-size: 14pt;
            font-family: "JetBrains Mono", monospace;
            
        }
        textarea:focus {
            border-color: #444;
        }
    </style>
</head>
<body>
    <div id="viewport">
        <div id="tape"></div>
    </div>

    <div id="textarea">
        <textarea name="main" id="main-textarea" rows="10" spellcheck="false" autocorrect="off" autofocus></textarea>
    </div>

    <script aria-label="textarea-content-save">
        const textarea = document.querySelector('textarea#main-textarea');
        let lastSavedValue = localStorage.getItem('text-content') || '';

        textarea.value = lastSavedValue;

        function debounce(func, timeout = 500) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => { func.apply(this, args); }, timeout);
            }
        }

        const saveContent = debounce((value) => {
            if (value === lastSavedValue) return;
            localStorage.setItem('text-content', value);
            lastSavedValue = value;
        }, 1000);

        textarea.addEventListener('input', (e) => saveContent(e.target.value))
    </script>
</body>
</html>
